<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <script src="script.js" defer></script>
  <title>Contact — Willow & Pine</title>
</head>
<body>

<header>
  <nav id="nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="index.html#abouthead">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<div class="contactForm">
  <h2>Contact Us</h2>

  <label for="Name">Full Name</label>
  <input type="text" id="Name" placeholder="Enter your name" required>

  <label for="Email">Email Address</label>
  <input type="email" id="Email" placeholder="Enter your email" required>

  <label for="Service">Service of Interest</label>
  <select id="Service">
    <option value="" disabled selected>Select a service…</option>
    <option>Bouquets &amp; Arrangements</option>
    <option>Event &amp; Wedding Services</option>
    <option>Design Consultation</option>
    <option>Delivery Services</option>
    <option>Other / Not Sure</option>
  </select>

  <label for="Message">Inquiry / Message</label>
  <textarea id="Message" placeholder="Tell us about your event — date, venue, vision, or any questions…"></textarea>

  <button class="servicesbtn" onclick="handleSubmit(event)">Send Inquiry</button>

  <p id="form-confirm" style="display:none;margin-top:20px;color:#422800;font-size:0.9rem;">
    &#10003; Thanks! We'll be in touch within 48 hours.
  </p>
</div>

<footer>&copy; 2025 Willow &amp; Pine &mdash; Floral Design &amp; Event Styling</footer>

</body>
</html>
